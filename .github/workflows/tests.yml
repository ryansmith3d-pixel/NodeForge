name: tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra community

      - name: Install package
        run: uv pip install -e .

      - name: Run tests
        run: uv run pytest tests/ -v --cov=idiograph --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Verify README diagrams are in sync
        run: |
          uv run python scripts/gen_diagrams.py
          git diff --exit-code README.md || (echo "README diagrams are out of sync. Run scripts/gen_diagrams.py and commit the result." && exit 1)